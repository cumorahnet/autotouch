<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoTouch · Modo Horizontal</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Forzar orientación horizontal */
        @media screen and (orientation: portrait) {
            body::before {
                content: "⚠️ Gira el teléfono a horizontal (landscape) para usar el sistema del auto";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: #0b0e14;
                color: #b0c7e7;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                padding: 30px;
                text-align: center;
                z-index: 9999;
                border: 4px solid #fbbc04;
                font-weight: 600;
            }
            body > * { display: none; }
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            overflow: hidden;
        }

        .dashboard {
            max-width: 900px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-height: 600px;
            background: #141a24;
            border-radius: 32px;
            padding: 16px 20px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.05);
            border: 1px solid #2f3a4a;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
            overflow-y: auto;
        }

        /* Scroll personalizado */
        .dashboard::-webkit-scrollbar { width: 4px; }
        .dashboard::-webkit-scrollbar-track { background: #141a24; }
        .dashboard::-webkit-scrollbar-thumb { background: #2f3a4a; border-radius: 10px; }

        /* Barra de estado */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b0c7e7;
            font-size: 13px;
            font-weight: 500;
            padding: 0 4px 12px 4px;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #28303d;
            flex-shrink: 0;
        }
        .status-bar i { margin-right: 5px; color: #6c8cba; }
        .status-left { display: flex; gap: 10px; }
        .status-right { display: flex; gap: 10px; }
        .battery {
            background: #1f2a36;
            padding: 2px 10px 2px 6px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Layout principal en grid horizontal */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 14px;
            flex: 1;
            min-height: 0;
            margin-top: 10px;
        }

        /* Columna izquierda */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        /* Grid de apps (más compacto en horizontal) */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px 8px;
            flex-shrink: 0;
        }
        .app-item {
            background: #1e2836;
            border-radius: 16px;
            padding: 10px 4px 8px;
            text-align: center;
            color: #d6e3f5;
            transition: all 0.15s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            border: 1px solid #2c384a;
            cursor: pointer;
            touch-action: manipulation;
        }
        .app-item:active {
            transform: scale(0.92);
            background: #2b3850;
            border-color: #4d6a8f;
        }
        .app-item i { font-size: 24px; margin-bottom: 4px; display: block; color: #9bb9e6; }
        .app-item span { font-size: 11px; font-weight: 500; display: block; letter-spacing: 0.2px; }
        .app-item .fab.fa-spotify { color: #1ed760; }
        .app-item .fas.fa-map-marked-alt { color: #fbbc04; }
        .app-item .fas.fa-waze { color: #33ccff; }
        .app-item .fas.fa-satellite-dish { color: #8ab4f8; }

        /* Panel de conexiones */
        .connections-panel {
            background: #0e1722;
            border-radius: 20px;
            padding: 10px 14px;
            border: 1px solid #2a3d52;
            flex-shrink: 0;
        }
        .connections-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #9ab3d6;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .connections-title i { margin-right: 4px; }
        .connections-title .badge-conn {
            background: #1f3145;
            padding: 1px 10px;
            border-radius: 30px;
            font-size: 10px;
            color: #b8d0ee;
        }
        .conn-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .conn-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a2535;
            padding: 8px 12px;
            border-radius: 14px;
            border-left: 3px solid #4a6a8a;
            transition: 0.2s;
        }
        .conn-item.internet-on { border-left-color: #4caf50; background: #0f241f; }
        .conn-item.audio-on { border-left-color: #1ed760; background: #132a20; }
        .conn-item .conn-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d0def5;
            font-size: 13px;
        }
        .conn-item .conn-info i { font-size: 16px; width: 20px; color: #7aa9e6; }
        .conn-item .conn-info .conn-name { font-weight: 500; font-size: 13px; }
        .conn-item .conn-info .conn-detail { font-size: 10px; color: #889fc0; }
        .conn-item .conn-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }
        .conn-item .conn-status .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: #4caf50; box-shadow: 0 0 8px #4caf5066; }
        .status-dot.offline { background: #6a4a4a; }
        .status-dot.streaming { background: #1ed760; box-shadow: 0 0 10px #1ed76077; }
        .conn-item .conn-actions button {
            background: transparent;
            border: 1px solid #3a4d66;
            color: #b8d0ee;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .conn-item .conn-actions button:active { transform: scale(0.90); background: #2d4460; }
        .conn-item .conn-actions button.connect-btn.active {
            background: #4caf5022;
            border-color: #4caf50;
            color: #7cf0b0;
        }
        .conn-item .conn-actions button.audio-btn.active {
            background: #1ed76022;
            border-color: #1ed760;
            color: #7cf0b0;
        }

        /* Columna derecha */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        /* Reproductor */
        .music-card {
            background: #1e2836;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #2d3b4e;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.03);
            flex-shrink: 0;
        }
        .music-cover {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #2b3d55, #141e2b);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #1ed760;
            border: 1px solid #3f5570;
            flex-shrink: 0;
        }
        .music-info { flex: 1; color: #e1edfa; min-width: 0; }
        .music-info .title { font-weight: 600; font-size: 14px; letter-spacing: -0.2px; }
        .music-info .artist { font-size: 12px; color: #99b0d0; margin-top: 2px; }
        .music-controls { display: flex; gap: 14px; color: #b8cef0; font-size: 17px; }
        .music-controls i { cursor: pointer; transition: 0.1s; touch-action: manipulation; }
        .music-controls i:active { color: white; transform: scale(0.85); }

        /* Navegación */
        .nav-panel {
            background: #161f2b;
            border-radius: 20px;
            padding: 12px 16px;
            border: 1px solid #2f3e52;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 6px;
        }
        .nav-destino { display: flex; align-items: center; gap: 8px; color: #c7dbf5; font-size: 14px; }
        .nav-destino i { font-size: 18px; color: #fbbc04; }
        .nav-destino span { font-weight: 500; font-size: 14px; }
        .nav-actions { display: flex; gap: 10px; color: #a4bedc; }
        .nav-actions i {
            font-size: 16px;
            background: #202d3d;
            padding: 6px;
            border-radius: 25px;
            border: 1px solid #3b4d66;
            transition: 0.1s;
            cursor: pointer;
            touch-action: manipulation;
        }
        .nav-actions i:active { background: #31445e; color: white; transform: scale(0.90); }

        /* GPS */
        .gps-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f1620;
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid #263340;
            flex-shrink: 0;
        }
        .gps-row .gps-text { color: #b8d0f0; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .gps-row .gps-text i { color: #4caf50; }
        .gps-row .gps-badge {
            background: #1f324a;
            padding: 3px 12px;
            border-radius: 25px;
            color: #aac3e5;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Footer */
        .footer-actions {
            display: flex;
            justify-content: space-around;
            color: #7289a5;
            font-size: 17px;
            border-top: 1px solid #25303e;
            padding-top: 12px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .footer-actions i { cursor: pointer; transition: 0.1s; padding: 4px 10px; border-radius: 25px; touch-action: manipulation; }
        .footer-actions i:active { background: #253240; color: #d6e6ff; }

        .touch-hint {
            text-align: center;
            color: #4b6180;
            font-size: 10px;
            margin-top: 6px;
            letter-spacing: 0.4px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        /* Responsive para pantallas más pequeñas en horizontal */
        @media (max-width: 700px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .dashboard {
                max-height: none;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                padding: 12px 14px 16px;
            }
            .app-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .app-item i { font-size: 22px; }
            .app-item span { font-size: 10px; }
        }

        @media (max-width: 500px) {
            .app-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
            .app-item { padding: 8px 4px 6px; }
            .app-item i { font-size: 18px; }
            .app-item span { font-size: 9px; }
            .conn-item .conn-info { font-size: 11px; }
            .music-info .title { font-size: 12px; }
            .music-info .artist { font-size: 10px; }
            .nav-destino span { font-size: 12px; }
            .gps-row .gps-text { font-size: 11px; }
        }

        @media (max-height: 450px) {
            .dashboard { padding: 8px 12px 12px; }
            .status-bar { padding-bottom: 6px; font-size: 11px; }
            .app-grid { gap: 4px; }
            .app-item { padding: 6px 4px 4px; }
            .app-item i { font-size: 16px; margin-bottom: 2px; }
            .app-item span { font-size: 8px; }
            .connections-panel { padding: 6px 10px; }
            .conn-item { padding: 4px 8px; }
            .music-card { padding: 8px 12px; }
            .music-cover { width: 36px; height: 36px; font-size: 16px; }
            .nav-panel { padding: 8px 12px; }
            .gps-row { padding: 4px 12px; }
            .footer-actions { padding-top: 6px; font-size: 14px; }
            .touch-hint { display: none; }
        }
    </style>
</head>
<body>
    <div class="dashboard" role="main" aria-label="Pantalla del auto - Modo Horizontal">

        <!-- Barra de estado -->
        <div class="status-bar">
            <div class="status-left">
                <span><i class="fas fa-signal"></i> 5G</span>
                <span><i class="fas fa-wifi"></i> Auto-Hub</span>
            </div>
            <div class="status-right">
                <span><i class="fas fa-bluetooth-b"></i> 2</span>
                <span><i class="fas fa-sun"></i> 22°</span>
                <span class="battery"><i class="fas fa-battery-three-quarters"></i> 86%</span>
            </div>
        </div>

        <!-- Grid principal: izquierda (apps + conexiones) y derecha (reproductor + navegación) -->
        <div class="main-grid">
            <!-- Columna izquierda -->
            <div class="left-col">
                <!-- Apps -->
                <div class="app-grid">
                    <div class="app-item" role="button" tabindex="0" aria-label="GPS Satelital">
                        <i class="fas fa-satellite-dish"></i>
                        <span>GPS</span>
                    </div>
                    <div class="app-item" role="button" tabindex="0" aria-label="Spotify música">
                        <i class="fab fa-spotify"></i>
                        <span>Spotify</span>
                    </div>
                    <div class="app-item" role="button" tabindex="0" aria-label="Google Maps">
                        <i class="fas fa-map-marked-alt"></i>
                        <span>Maps</span>
                    </div>
                    <div class="app-item" role="button" tabindex="0" aria-label="Waze navegación">
                        <i class="fas fa-waze"></i>
                        <span>Waze</span>
                    </div>
                </div>

                <!-- Conexiones -->
                <div class="connections-panel">
                    <div class="connections-title">
                        <span><i class="fas fa-link"></i> Conexiones</span>
                        <span class="badge-conn" id="connCount">2 de 2</span>
                    </div>
                    <div class="conn-list">
                        <!-- Internet -->
                        <div class="conn-item internet-on" id="connInternet">
                            <div class="conn-info">
                                <i class="fas fa-wifi"></i>
                                <div>
                                    <span class="conn-name">Internet</span>
                                    <span class="conn-detail">· Hotspot</span>
                                </div>
                            </div>
                            <div class="conn-status">
                                <span class="status-dot online"></span>
                                <span style="font-size:10px; color:#7cf0b0;">Activo</span>
                            </div>
                            <div class="conn-actions">
                                <button class="connect-btn active" id="internetBtn">Desconectar</button>
                            </div>
                        </div>
                        <!-- Audio -->
                        <div class="conn-item audio-on" id="connAudio">
                            <div class="conn-info">
                                <i class="fas fa-music"></i>
                                <div>
                                    <span class="conn-name">Audio</span>
                                    <span class="conn-detail">· Stereo</span>
                                </div>
                            </div>
                            <div class="conn-status">
                                <span class="status-dot streaming"></span>
                                <span style="font-size:10px; color:#7cf0b0;">Transmitiendo</span>
                            </div>
                            <div class="conn-actions">
                                <button class="audio-btn active" id="audioBtn">Desconectar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna derecha -->
            <div class="right-col">
                <!-- Reproductor -->
                <div class="music-card">
                    <div class="music-cover">
                        <i class="fab fa-spotify"></i>
                    </div>
                    <div class="music-info">
                        <div class="title" id="songTitle">Bluetooth Stream</div>
                        <div class="artist" id="songArtist">Desde el auto</div>
                    </div>
                    <div class="music-controls">
                        <i class="fas fa-step-backward" aria-label="Anterior"></i>
                        <i class="fas fa-play-circle" id="playPauseBtn" aria-label="Play/Pausa"></i>
                        <i class="fas fa-step-forward" aria-label="Siguiente"></i>
                    </div>
                </div>

                <!-- Navegación -->
                <div class="nav-panel">
                    <div class="nav-destino">
                        <i class="fas fa-location-dot"></i>
                        <span id="navDestinoText">Home · 12 min</span>
                    </div>
                    <div class="nav-actions">
                        <i class="fas fa-route" aria-label="Ruta"></i>
                        <i class="fas fa-microphone" aria-label="Comando voz"></i>
                        <i class="fas fa-ellipsis-vertical"></i>
                    </div>
                </div>

                <!-- GPS -->
                <div class="gps-row">
                    <div class="gps-text">
                        <i class="fas fa-crosshairs"></i>
                        <span>GPS: <strong id="gpsCoords">19.4326° N, 99.1332° O</strong></span>
                    </div>
                    <div class="gps-badge" id="gpsBadge">
                        <i class="fas fa-circle" style="color: #4caf50; font-size: 8px;"></i> <span id="satCount">14</span> sat
                    </div>
                </div>

                <!-- Footer -->
                <div class="footer-actions">
                    <i class="fas fa-home" aria-label="Inicio"></i>
                    <i class="fas fa-compass" aria-label="Brújula"></i>
                    <i class="fas fa-cog" aria-label="Ajustes"></i>
                    <i class="fas fa-phone" aria-label="Llamada"></i>
                </div>
            </div>
        </div>

        <div class="touch-hint">
            <i class="fas fa-hand-pointer"></i> Modo horizontal · Todas las apps en el auto
        </div>
    </div>

    <script>
        (function() {
            // DOM Elements (cached for performance)
            const internetBtn = document.getElementById('internetBtn');
            const audioBtn = document.getElementById('audioBtn');
            const connInternet = document.getElementById('connInternet');
            const connAudio = document.getElementById('connAudio');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const songTitleElement = document.getElementById('songTitle'); // Renamed to avoid clash
            const songArtistElement = document.getElementById('songArtist'); // Renamed to avoid clash
            const navDestinoText = document.getElementById('navDestinoText');
            const gpsCoordsElement = document.getElementById('gpsCoords'); // Renamed
            const satCountElement = document.getElementById('satCount'); // Renamed
            const gpsBadge = document.getElementById('gpsBadge');
            const connCount = document.getElementById('connCount');
            const footerHomeBtn = document.querySelector('.footer-actions .fa-home');
            const footerCompassBtn = document.querySelector('.footer-actions .fa-compass');
            const footerSettingsBtn = document.querySelector('.footer-actions .fa-cog');
            const footerPhoneBtn = document.querySelector('.footer-actions .fa-phone');


            // Application State
            const state = {
                internetConnected: navigator.onLine,
                audioPlaying: false, // Represents if actual audio is being generated
                geolocationActive: false, // True if watchPosition is active and successfully updating
                currentDestinationIndex: 0,
                currentSong: {
                    title: 'Bluetooth Stream',
                    artist: 'Desde el auto'
                },
                gps: {
                    latitude: 'N/A',
                    longitude: 'N/A',
                    satellites: '0',
                    permissionDenied: false,
                    notAvailable: false
                }
            };

            // Constants
            let audioContext = null;
            let oscillator = null;
            let geolocationWatchId = null;
            const destinos = ['Home · 12 min', 'Trabajo · 8 min', 'Gym · 5 min', 'Super · 4 min', 'Cine · 15 min', 'Mall · 9 min'];
            const appTargets = {
                'GPS Satelital': 'https://www.google.com/maps',
                'Spotify música': 'https://open.spotify.com',
                'Google Maps': 'https://www.google.com/maps',
                'Waze navegación': 'https://www.waze.com'
            };

            // Utility Functions
            function vibrate(duration = 8) {
                if (navigator.vibrate) navigator.vibrate(duration);
            }

            // UI Rendering Function
            function renderUI() {
                // Internet Connection
                if (state.internetConnected) {
                    connInternet.classList.add('internet-on');
                    connInternet.querySelector('.status-dot').className = 'status-dot online';
                    connInternet.querySelector('.conn-status span:last-child').textContent = 'En línea';
                    internetBtn.textContent = 'Comprobar';
                    internetBtn.classList.add('active');
                } else {
                    connInternet.classList.remove('internet-on');
                    connInternet.querySelector('.status-dot').className = 'status-dot offline';
                    connInternet.querySelector('.conn-status span:last-child').textContent = 'Sin conexión';
                    internetBtn.textContent = 'Reintentar';
                    internetBtn.classList.remove('active');
                }

                // Audio Connection (music player state)
                if (state.audioPlaying) {
                    connAudio.classList.add('audio-on');
                    connAudio.querySelector('.status-dot').className = 'status-dot streaming';
                    connAudio.querySelector('.conn-status span:last-child').textContent = 'Reproduciendo';
                    audioBtn.textContent = 'Detener';
                    audioBtn.classList.add('active');
                    playPauseBtn.classList.remove('fa-play-circle');
                    playPauseBtn.classList.add('fa-pause-circle');
                    songTitleElement.textContent = 'Bluetooth · ▶';
                    songArtistElement.textContent = 'Audio real generado por el navegador';
                } else {
                    connAudio.classList.remove('audio-on');
                    connAudio.querySelector('.status-dot').className = 'status-dot offline';
                    connAudio.querySelector('.conn-status span:last-child').textContent = 'Detenido';
                    audioBtn.textContent = 'Reproducir';
                    audioBtn.classList.remove('active');
                    playPauseBtn.classList.remove('fa-pause-circle');
                    playPauseBtn.classList.add('fa-play-circle');
                    songTitleElement.textContent = state.currentSong.title; // Revert to default or last known
                    // Dynamic songArtist based on other statuses when audio is not playing
                    if (state.geolocationActive && !state.gps.permissionDenied && !state.gps.notAvailable) {
                        songArtistElement.textContent = state.internetConnected ? 'GPS activo · ubicación real' : 'GPS activo · sin conexión';
                    } else if (state.internetConnected) {
                        songArtistElement.textContent = 'Desde el auto';
                    } else {
                        songArtistElement.textContent = 'Sin conexión real · audio detenido';
                    }
                }

                // Connection Count
                const activeConnections = (state.internetConnected ? 1 : 0) + (state.audioPlaying ? 1 : 0);
                connCount.textContent = `${activeConnections} de 2`;

                // Navigation Destination
                navDestinoText.textContent = destinos[state.currentDestinationIndex];

                // GPS Status
                if (state.gps.permissionDenied) {
                    gpsCoordsElement.textContent = 'Permiso de GPS denegado';
                    satCountElement.textContent = '0';
                } else if (state.gps.notAvailable) {
                    gpsCoordsElement.textContent = 'Geolocalización no disponible';
                    satCountElement.textContent = '0';
                } else {
                    gpsCoordsElement.textContent = `${state.gps.latitude}° N, ${state.gps.longitude}° O`;
                    satCountElement.textContent = state.gps.satellites;
                }
            }

            // Core Logic Functions
            async function checkInternet() {
                try {
                    await fetch('https://www.google.com', { method: 'HEAD', mode: 'no-cors' });
                    state.internetConnected = true;
                } catch (error) {
                    state.internetConnected = false;
                }
                renderUI();
            }

            function startAudio() {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }

                oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.03, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start();
                state.audioPlaying = true;
                renderUI();
            }

            function stopAudio() {
                if (oscillator) {
                    oscillator.stop();
                    oscillator.disconnect();
                    oscillator = null;
                }
                state.audioPlaying = false;
                renderUI();
            }

            function toggleAudio() {
                if (state.audioPlaying) {
                    stopAudio();
                } else {
                    startAudio();
                }
                vibrate(8);
            }

            function updateLocation(position) {
                const { latitude, longitude, accuracy } = position.coords;
                state.gps.latitude = latitude.toFixed(4);
                state.gps.longitude = Math.abs(longitude).toFixed(4);
                // Estimate satellites from accuracy, clamp between 4 and 24
                state.gps.satellites = `${Math.max(4, Math.min(24, Math.round(accuracy / 10)))}`;
                state.gps.permissionDenied = false;
                state.gps.notAvailable = false;
                state.geolocationActive = true;
                renderUI();
            }

            function handleLocationError(error) {
                state.geolocationActive = false;
                if (error.code === error.PERMISSION_DENIED) {
                    state.gps.permissionDenied = true;
                    state.gps.notAvailable = false;
                } else {
                    state.gps.permissionDenied = false;
                    state.gps.notAvailable = true;
                }
                renderUI();
            }

            function requestLocation() {
                if (!navigator.geolocation) {
                    state.gps.notAvailable = true;
                    renderUI();
                    return;
                }

                // Try to get current position once (might be faster for initial display)
                navigator.geolocation.getCurrentPosition(updateLocation, handleLocationError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });

                // If not already watching, start watching
                if (geolocationWatchId === null) {
                    geolocationWatchId = navigator.geolocation.watchPosition(updateLocation, handleLocationError, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 30000
                    });
                }
            }

            // Event Listeners
            internetBtn.addEventListener('click', async function(e) {
                e.stopPropagation();
                await checkInternet();
                vibrate(12);
            });

            audioBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleAudio();
            });

            playPauseBtn.addEventListener('click', function() {
                toggleAudio();
            });

            gpsBadge.addEventListener('click', function() {
                requestLocation();
                vibrate(6);
            });

            document.querySelector('.nav-actions i.fa-route').addEventListener('click', function() {
                state.currentDestinationIndex = (state.currentDestinationIndex + 1) % destinos.length;
                renderUI();
                vibrate(6);
            });

            document.querySelector('.nav-actions i.fa-microphone').addEventListener('click', function() {
                vibrate(10);
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    songTitleElement.textContent = 'Comandos de voz no disponibles';
                    setTimeout(() => renderUI(), 3000); // Revert after a few seconds
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                // Temporarily change songTitle to indicate listening
                const originalSongTitle = songTitleElement.textContent;
                songTitleElement.textContent = 'Escuchando...';

                recognition.onresult = function(event) {
                    const text = event.results[0][0].transcript.toLowerCase();
                    if (text.includes('trabajo')) state.currentDestinationIndex = destinos.indexOf('Trabajo · 8 min');
                    else if (text.includes('casa')) state.currentDestinationIndex = destinos.indexOf('Home · 12 min');
                    else if (text.includes('gimnasio')) state.currentDestinationIndex = destinos.indexOf('Gym · 5 min');
                    else if (text.includes('super')) state.currentDestinationIndex = destinos.indexOf('Super · 4 min');
                    else if (text.includes('cine')) state.currentDestinationIndex = destinos.indexOf('Cine · 15 min');
                    else if (text.includes('mall')) state.currentDestinationIndex = destinos.indexOf('Mall · 9 min');
                    else {
                        songTitleElement.textContent = 'Comando no reconocido';
                        setTimeout(() => renderUI(), 3000); // Revert after 3 seconds
                    }
                    renderUI(); // Update destination if recognized
                    vibrate(10);
                };
                recognition.onerror = function() {
                    songTitleElement.textContent = 'No se pudo usar el micrófono';
                    setTimeout(() => renderUI(), 3000); // Revert after 3 seconds
                    vibrate(10);
                };
                recognition.onend = function() {
                    // If no result or error, and songTitle is still 'Escuchando...', revert it
                    if (songTitleElement.textContent === 'Escuchando...') {
                         songTitleElement.textContent = originalSongTitle;
                         renderUI(); // Render again to ensure state is reflected
                    }
                };
                recognition.start();
            });


            document.querySelectorAll('.app-item').forEach(el => {
                el.addEventListener('click', function() {
                    vibrate(10);
                    const label = this.getAttribute('aria-label') || this.querySelector('span').textContent.trim();

                    if (!state.internetConnected && label !== 'GPS Satelital') { // Allow GPS Satelital (Google Maps) even offline, but warn. Maybe GPS is cached.
                        songTitleElement.textContent = `Sin conexión para ${label}`;
                        setTimeout(() => renderUI(), 3000); // Revert after 3 seconds
                        return;
                    }

                    const target = appTargets[label];
                    if (target) {
                        window.open(target, '_blank', 'noopener');
                        songTitleElement.textContent = `Abriendo ${label}`;
                        setTimeout(() => renderUI(), 3000); // Revert after 3 seconds
                    }
                });
            });

            // Footer button actions
            footerHomeBtn.addEventListener('click', () => { vibrate(8); songTitleElement.textContent = 'Volviendo a inicio'; setTimeout(() => renderUI(), 3000); });
            footerCompassBtn.addEventListener('click', () => { vibrate(8); songTitleElement.textContent = 'Mostrando brújula'; setTimeout(() => renderUI(), 3000); });
            footerSettingsBtn.addEventListener('click', () => { vibrate(8); songTitleElement.textContent = 'Abriendo ajustes'; setTimeout(() => renderUI(), 3000); });
            footerPhoneBtn.addEventListener('click', () => { vibrate(8); songTitleElement.textContent = 'Abriendo contactos'; setTimeout(() => renderUI(), 3000); });


            // Initial Setup and Event Listeners for network status
            window.addEventListener('online', () => {
                state.internetConnected = true;
                renderUI();
            });
            window.addEventListener('offline', () => {
                state.internetConnected = false;
                renderUI();
            });

            // Initialize UI and check states
            renderUI();
            checkInternet(); // Initial check
            requestLocation(); // Start GPS updates
        })();
    </script>
</body>
</html>
